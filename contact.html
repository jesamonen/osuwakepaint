<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | Osuwake Paints</title>

    <meta name="description"
          content="Contact Osuwake Paints & Screeding Solutions for quotes, support, and inquiries.">

    <link rel="stylesheet" href="styles/style.css">
    <script defer src="scripts/script.js"></script>
</head>

<body>

<!-- NAVIGATION -->
<header id="main-nav"></header>

<!-- HERO -->
<section class="page-banner">
    <div class="container">
        <h1>Contact Us</h1>
        <p>We are ready to respond to your painting and screeding needs.</p>
    </div>
</section>

<!-- CONTACT SECTION -->
<section class="container contact-grid">

    <!-- COMPANY INFO -->
    <div>

        <h2>Get In Touch</h2>

        <p><strong>Phone:</strong> +234 703 984 2879</p>
        <p><strong>Email:</strong> info@osuwakepaints.com</p>
        <p><strong>WhatsApp:</strong> +234 703 984 2879</p>
        <p><strong>Location:</strong> Lagos, Nigeria</p>

    </div>

    <!-- FORM -->
    <div>

        <form action="https://formsubmit.co/codewithjesam@gmail.com" method="POST">

            <!-- SETTINGS -->
            <input type="hidden" name="_subject" value="New Contact Message - Osuwake Paints">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="thankyou.html">

            <!-- EMAIL AUTORESPONDER -->
            <input type="hidden" name="_autoresponse"
            value="Hello 👋

Thank you for reaching out to Osuwake Paints & Screeding Solutions.

We’ve received your message and our team will respond within 24 hours.

For urgent support, contact us on WhatsApp.

Regards,
Osuwake Paints Team">

            <!-- USER INPUTS -->
            <input type="text" name="name" placeholder="Full Name" required>

            <input type="email" name="email" placeholder="Email Address" required>

            <textarea name="message" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>

</section>

<!-- GOOGLE MAP -->
<section class="container">

    <h2>Our Location</h2>

    <div class="map-container">



<iframe
  src="https://www.google.com/maps?q=Lagos,Nigeria&output=embed"
  width="100%"
  height="350"
  style="border:0;"
  loading="lazy">
</iframe>

    </div>

</section>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/2347039842879"
   class="whatsapp"
   target="_blank">
   💬
</a>

<!-- FOOTER -->
<footer>
    <div class="container">
        <p>© 2026 Osuwake Paints & Screeding Solutions. All Rights Reserved.</p>
    </div>
</footer>

<script>
document.querySelector("form").addEventListener("submit", function () {

    fetch("https://script.google.com/macros/s/AKfycbzV_TVHXxcJvrIyFuOYJgcb500B18oYqLc4BPlEmaxCXbIPVOCI9xas-N6v8Ypadr19/exec", {
        method: "POST",
        body: JSON.stringify({
            name: document.querySelector("[name='name']").value,
            email: document.querySelector("[name='email']").value,
            message: document.querySelector("[name='message']").value
        })
    });

});
</script>

</body>
</html>
